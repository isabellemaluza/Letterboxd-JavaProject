<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <title>Cadastrar Filme</title>
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>

<body>

    <header>
        <h1 th:text="${filme.id != null} ? 'Editar Filme' : 'Cadastrar Filme'"></h1>
        <p>Preencha os dados do seu filme favorito</p>
    </header>

    <section class="formulario">
        <h2 th:text="${filme.id != null} ? 'Editar Cadastro' : 'Formulário de Cadastro'"></h2>

        <div th:if="${erro}" style="color:#ef4444; text-align:center; margin-bottom:15px;">
            <span th:text="${erro}"></span>
        </div>

        <form th:action="${filme.id != null} ? @{/atualizarfilme} : @{/salvarfilme}"
              th:object="${filme}" method="post">

            <input type="hidden" th:field="*{id}">

            <label for="titulo">Título do filme (*)</label>
            <input type="text" id="titulo" th:field="*{titulo}" placeholder="Digite o título do filme" required>

            <label for="diretor">Diretor</label>
            <input type="text" id="diretor" th:field="*{diretor}" placeholder="Digite o nome do diretor">

            <label for="genero">Gênero (*)</label>
            <select id="genero" th:field="*{genero}" required>
                <option value="">Selecione um gênero</option>
                <option value="Ação">Ação</option>
                <option value="Drama">Drama</option>
                <option value="Comédia">Comédia</option>
                <option value="Ficção Científica">Ficção Científica</option>
                <option value="Terror">Terror</option>
                <option value="Romance">Romance</option>
                <option value="Suspense">Suspense</option>
                <option value="Animação">Animação</option>
            </select>

            <label for="ano">Ano de lançamento</label>
            <input type="number" id="ano" th:field="*{ano}" placeholder="Ex: 2014">

            <label for="nota">Nota (*)</label>
            <input type="number" id="nota" th:field="*{nota}" min="0" max="10" step="0.1" placeholder="Ex: 9.5" required>

            <label for="comentario">Comentário</label>
            <textarea id="comentario" th:field="*{comentario}" placeholder="Escreva uma breve opinião sobre o filme"></textarea>

            <button type="submit" th:text="${filme.id != null} ? 'Atualizar Filme' : 'Salvar Filme'"></button>
        </form>

        <div style="text-align: center;">
            <a class="voltar" th:href="@{/}">⬅ Voltar</a>
        </div>
    </section>

    <footer>
        <p>Projeto acadêmico - Cadastro de filmes</p>
    </footer>

</body>
</html>
