<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security">
<head>
    <title>Listar Filmes</title>
    <meta charset="UTF-8">
    <link rel="stylesheet" th:href="@{/css/index.css}">
</head>
<body>

<header>
    <h1>Filmes cadastrados</h1>
    <div style="text-align:center; margin-top:10px;">
        <a sec:authorize="isAnonymous()" th:href="@{/login}">
            <button type="button">Login</button>
        </a>
        <form sec:authorize="isAuthenticated()" th:action="@{/logout}" method="post" style="display:inline;">
            <button type="submit" style="background:#ef4444;">Sair</button>
        </form>
    </div>
</header>

<section class="destaques">

    <p th:if="${#lists.isEmpty(filmes)}">Nenhum filme encontrado.</p>

    <div class="cards" th:if="${not #lists.isEmpty(filmes)}">

        <div class="card" th:each="filme : ${filmes}">

            <h3 th:text="${filme.titulo}"></h3>

            <p><strong>Diretor:</strong> <span th:text="${filme.diretor}"></span></p>
            <p><strong>Gênero:</strong> <span th:text="${filme.genero}"></span></p>
            <p><strong>Ano:</strong> <span th:text="${filme.ano}"></span></p>
            <p><strong>Nota:</strong> ⭐ <span th:text="${filme.nota}"></span></p>
            <p><strong>Comentário:</strong> <span th:text="${filme.comentario}"></span></p>

            <p sec:authorize="hasRole('ADMIN')">
                <strong>Cadastrado por:</strong>
                <span th:text="${filme.cadastradoPor}"></span>
            </p>

            <div sec:authorize="hasRole('ADMIN')"
                 style="display: flex; gap: 10px; margin-top: 15px; justify-content: center;">
                <a th:href="@{/editar/{id}(id=${filme.id})}">
                    <button type="button">Editar</button>
                </a>
                <a th:href="@{/deletar/{id}(id=${filme.id})}"
                   onclick="return confirm('Tem certeza que deseja deletar este filme?')">
                    <button type="button" style="background:#ef4444;">Deletar</button>
                </a>
            </div>

        </div>

    </div>

</section>

<div style="text-align: center; margin-top: 20px;">
    <a th:href="@{/}" class="voltar" sec:authorize="isAuthenticated()">⬅ Voltar</a>
</div>

</body>
</html>
